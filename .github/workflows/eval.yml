name: eval

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"   # 03:00 UTC-3 daily

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e .[test]
      - run: pytest -m agent_eval -v
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
