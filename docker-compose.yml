services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    environment:
      POSTGRES_DB: nutrition
      POSTGRES_USER: nutrition
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrition"]
      interval: 5s
      timeout: 5s
      retries: 5

  seed:
    build:
      context: ./db
      dockerfile: seed/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nutrition:${POSTGRES_PASSWORD}@postgres:5432/nutrition
    restart: "no"

  mcp-server:
    build: ./mcp-server
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nutrition:${POSTGRES_PASSWORD}@postgres:5432/nutrition
    restart: unless-stopped

  # NATS — required by Omni for internal eventing.
  nats:
    image: nats:2-alpine
    ports:
      - "4222:4222"
    restart: unless-stopped

  # Genie orchestrator — exposes :4000 internally; only `omni` calls it.
  # Agent and MCP definitions are bind-mounted so edits reload without
  # rebuilding the image. See docs/specs/2026-04-30-reproducible-setup-design.md.
  genie:
    build: ./genie
    depends_on:
      mcp-server:
        condition: service_started
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MCP_SERVER_URL: http://mcp-server:8000/sse
    volumes:
      - ./agents:/app/agents:ro
      - ./.genie:/app/.genie:ro
      - ./.mcp.json:/app/.mcp.json:ro
      - genie_state:/var/lib/genie
    restart: unless-stopped

  # Omni WhatsApp bridge — uses the existing Postgres (database `omni`,
  # auto-created by db/init/01-create-omni-db.sql) and the sibling NATS
  # service. Baileys session persists in omni_sessions so pairing is
  # one-time. See docs/specs/2026-04-30-reproducible-setup-design.md §4.1.
  omni:
    build: ./omni
    ports:
      - "8882:8882"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      genie:
        condition: service_started
    environment:
      API_PORT: "8882"
      DATABASE_URL: postgresql://nutrition:${POSTGRES_PASSWORD}@postgres:5432/omni
      NATS_URL: nats://nats:4222
      OMNI_API_KEY: ${OMNI_API_KEY}
    volumes:
      - omni_sessions:/var/lib/omni/sessions
    restart: unless-stopped

volumes:
  postgres_data:
  genie_state:
  omni_sessions:
